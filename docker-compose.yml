version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount backend code for live reloading
      - ./backend/app:/app/app

      # FIX: Mount the 'frontend' folder directly (removed /public)
      - ./frontend:/app/frontend

    environment:
      - DOCKER_ENV=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload